<!DOCTYPE html>
<html lang="sv">
<head>
  <!-- =========================================================
       SCHEMA-PROGRAM — index.html (AUTOPATCH v3 + PICO SAFE MODE + SPRINT 3)
       Syfte: Stabil start för UI-only app (GitHub Pages)
       Kontrakt: router.js kräver #app, #error-panel, #navbar
       FIX: Länka MASTER stylesheet (import-kedjan) så home/cards/grid syns
       NYTT: Pico CSS (safe mode) + pico-overrides.css
       S3-05: print.css för utskriftsvänlig veckovy
       ========================================================= -->

  <!-- BLOCK 1 — Meta -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schema-Program</title>

  <!-- BLOCK 2 — Favicon (ingen 404) -->
  <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>📅</text></svg>">

  <!-- BLOCK 3 — CSS (PICO + SINGLE SOURCE OF TRUTH)
       VIKTIGT:
       - Ladda Pico FÖRE master.css (baseline typografi/forms)
       - Ladda master.css (som @import:ar base/forms/cards/home/navbar/responsive osv)
       - Ladda pico-overrides.css EFTER master.css för att minimera krockar
       - print.css laddas med media="print" (S3-05)
  -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="assets/css/master.css" />
  <link rel="stylesheet" href="assets/css/pico-overrides.css" />
  <link rel="stylesheet" href="assets/css/print.css" media="print" />

  <!-- BLOCK 4 — Baslinje: undvik "flash" av tomma paneler -->
  <style>
    /* Fail-closed: error-panel ska inte synas förrän ui.js sätter innehåll */
    #error-panel { display: none; }
  </style>
</head>

<body>
  <!-- =========================================================
       BLOCK 5 — ROUTER-KRAV (DOM hooks)
       Router kräver dessa ID:n:
       - #navbar (topbar)
       - #error-panel (felvisning)
       - #app (huvudcontainer)
       ========================================================= -->

  <div id="navbar"><!-- renderNavbar() fyller denna --></div>

  <div id="error-panel" aria-live="polite"><!-- renderError() fyller denna --></div>

  <main id="app" role="main"><!-- views renderar hit --></main>

  <!-- =========================================================
       BLOCK 6 — App start
       Viktigt: type="module" för ESM-imports
       ========================================================= -->
  <script type="module" src="src/main.js"></script>

  <!-- BLOCK 7 — NoScript fallback -->
  <noscript>
    <div style="padding:16px; margin:16px; border:2px solid #d63031; border-radius:8px; background:#ffe8e8;">
      <strong>JavaScript krävs.</strong> Slå på JavaScript för att använda Schema-Program.
    </div>
  </noscript>
</body>
</html>
